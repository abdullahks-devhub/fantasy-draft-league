<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Wrestling Fantasy League Season 4 — Multi-promotion fantasy wrestling with automated point calculation, roster management, and live standings." />
    <title>Wrestling Fantasy League — Season 4</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
    <script>
      window.onerror = function(msg, url, line, col, error) {
        var div = document.createElement('div');
        div.style.cssText = 'color:red;position:fixed;top:0;left:0;width:100%;padding:20px;background:white;z-index:99999;font-family:monospace;border-bottom:3px solid red;';
        div.innerText = 'CRITICAL ERROR: ' + msg + '\nURL: ' + url + '\nLine: ' + line + ':' + col;
        document.body.appendChild(div);
      };
    </script>
  </head>
  <body>
    <div id="root" style="color: #666; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh;">
      <span>Initializing Wrestling Fantasy League...</span>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
