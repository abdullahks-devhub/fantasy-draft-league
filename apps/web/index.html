<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Wrestling Fantasy League Season 4 — Multi-promotion fantasy wrestling with automated point calculation, roster management, and live standings." />
    <title>Wrestling Fantasy League — Season 4</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      window.onerror = function(msg, url, line, col, error) {
        var div = document.createElement('div');
        div.style.color = 'red';
        div.style.position = 'fixed';
        div.style.top = '0';
        div.style.left = '0';
        div.style.width = '100%';
        div.style.padding = '20px';
        div.style.background = 'white';
        div.style.zIndex = '99999';
        div.innerText = 'Error: ' + msg + '\nURL: ' + url + '\nLine: ' + line;
        document.body.appendChild(div);
      };
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
