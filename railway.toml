# Railway Configuration for Wrestling Fantasy League
# This file defines how the API and Background Worker are built/deployed.

[build]
builder = "NIXPACKS"
buildCommand = "npm install && npx prisma generate --schema=apps/api/prisma/schema.prisma && npm run build --workspace=@fantasy/api && npx playwright install chromium --with-deps"

[deploy]
startCommand = "node apps/api/dist/server.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10


# Note: In Railway, you should create a SECOND service for the worker 
# and override the start command to: "node apps/api/dist/server.js --worker"
# (Assuming we added a flag or a separate entry point)
